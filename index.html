<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IMMORTAL | DASHBOARD</title>
    <link rel="icon" type="image/png" href="https://files.catbox.moe/ba52c8.webp">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.45);
            --bg: #030406;
            --glass-bg: rgba(10, 18, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- THE PRO BACKGROUND --- */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 700px; height: 700px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 2; filter: blur(120px);
            opacity: 0.2; pointer-events: none;
            animation: moveOrb 25s infinite alternate ease-in-out;
        }

        @keyframes moveOrb {
            0% { transform: translate(-40%, -40%); }
            100% { transform: translate(40%, 40%); }
        }

        .noise-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.04; z-index: 3; pointer-events: none;
        }

        /* --- TOP HEADER TEXT --- */
        .top-system-title {
            position: relative;
            z-index: 10;
            font-size: 0.7rem;
            letter-spacing: 8px;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 20px;
            opacity: 0.8;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1350px;
            padding: 30px;
            animation: bootUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(15px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* --- SMOOTH GLASS WIDGETS --- */
        .glass-widget {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 2.8rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s;
        }

        .glass-widget:hover {
            border-color: var(--accent-glow);
            transform: translateY(-5px);
        }

        /* --- AUTH CARD --- */
        .auth-card {
            max-width: 500px;
            margin: auto;
            padding: 50px 40px;
            text-align: center;
        }

        .auth-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #004d52);
            padding: 3px; margin: 0 auto 20px;
            box-shadow: 0 0 30px var(--accent-glow);
            cursor: pointer;
            overflow: hidden; 
        }

        .auth-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        .auth-tabs {
            display: flex; background: rgba(0,0,0,0.4);
            border-radius: 100px; padding: 6px; margin: 30px 0;
        }

        .auth-tab {
            flex: 1; padding: 14px; background: none; border: none;
            color: #666; font-family: 'JetBrains Mono'; font-weight: 800;
            font-size: 0.75rem; cursor: pointer; transition: 0.4s;
            border-radius: 100px;
        }

        .auth-tab.active {
            color: #000; background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-glass {
            width: 100%; background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border); border-radius: 1.5rem;
            padding: 18px 25px; color: #fff; margin-bottom: 15px;
            font-family: 'Outfit'; font-size: 1rem; transition: 0.3s;
        }

        .input-glass:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .btn-fancy {
            width: 100%; background: var(--accent);
            color: #000; padding: 18px; border: none;
            border-radius: 1.5rem; font-weight: 800;
            font-family: 'JetBrains Mono'; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s;
        }

        .btn-fancy:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        /* --- DASHBOARD LAYOUT --- */
        .dashboard { display: none; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }

        .widget-header {
            font-family: 'JetBrains Mono'; color: var(--accent);
            font-weight: 800; font-size: 0.85rem; letter-spacing: 4px;
            padding: 25px 30px 0; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        .widget-content { padding: 30px; }

        .data-row {
            display: flex; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .label { color: #888; font-size: 0.8rem; }
        .value { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: #fff; }

        .hwid-tag {
            background: rgba(0,0,0,0.6); border: 1px dashed var(--accent);
            padding: 15px; border-radius: 1rem; color: var(--accent);
            font-family: 'JetBrains Mono'; font-size: 0.8rem; text-align: center;
            margin: 20px 0;
        }

        .logout-btn {
            background: rgba(255, 60, 60, 0.1); border: 1px solid rgba(255, 60, 60, 0.3);
            color: #ff3c3c; padding: 12px 25px; border-radius: 50px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        @media (max-width: 950px) { .dash-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="glow-orb" style="top: 10%; left: 10%;"></div>
    <div class="glow-orb" style="bottom: 10%; right: 10%; background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, transparent 70%);"></div>
    <div class="noise-layer"></div>

    <div class="top-system-title">IMMORTAL | DASHBOARD</div>

    <div class="main-container">
        <div id="authPanel" class="glass-widget auth-card">
            <div class="auth-avatar" id="avatarUploadTrigger">
                <img id="avatarImg" src="https://files.catbox.moe/ba52c8.webp" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23000\' width=\'60\' height=\'60\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E'" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
            </div>
            <div class="auth-title">IMMORTAL</div>
            <p style="font-size:0.6rem; letter-spacing:5px; color:var(--accent); margin-top:5px; opacity:0.7;">CORE SECURITY INTERFACE</p>

            <div class="auth-tabs">
                <button class="auth-tab active" data-auth="login">ACCESS_CORE</button>
                <button class="auth-tab" data-auth="signup">REGISTER_ID</button>
            </div>

            <div id="loginForm">
                <input type="text" id="loginUsername" class="input-glass" placeholder="USERNAME">
                <input type="password" id="loginPassword" class="input-glass" placeholder="PASSKEY">
                <button id="doLoginBtn" class="btn-fancy">INITIALIZE</button>
                <div id="loginError" style="color:#ff3c3c; font-size:0.75rem; margin-top:15px; font-family:'JetBrains Mono'"></div>
            </div>

            <div id="signupForm" style="display:none;">
                <input type="text" id="regUsername" class="input-glass" placeholder="NEW_USER">
                <input type="email" id="regEmail" class="input-glass" placeholder="EMAIL_SYNC">
                <input type="password" id="regPassword" class="input-glass" placeholder="SECURE_PASS">
                <button id="doSignupBtn" class="btn-fancy">CREATE ACCOUNT</button>
                <div id="regError" style="font-size:0.75rem; margin-top:15px; font-family:'JetBrains Mono'"></div>
            </div>
            <p style="font-size:0.6rem; margin-top:20px; opacity:0.4;">CLICK AVATAR TO UPLOAD IDENTITY PHOTO</p>
        </div>

        <div id="dashboard" class="dashboard">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:40px; padding:0 20px;">
                <div>
                    <h1 style="font-size:3.2rem; font-weight:800; letter-spacing:15px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; color: transparent;">IMMORTAL</h1>
                    <p style="font-size:0.7rem; letter-spacing:5px; color:#666;">DASHBOARD CONTROL MODULE // v5.0.1</p>
                </div>
                <button id="dashboardLogoutBtn" class="logout-btn">TERMINATE_SESSION</button>
            </div>

            <div class="dash-grid">
                <div>
                    <div class="glass-widget">
                        <div class="widget-header"><i class="fas fa-user-circle"></i> IDENTITY_PROFILE</div>
                        <div class="widget-content">
                            <div class="data-row"><span class="label">Username</span><span class="value" id="accountUsername">—</span></div>
                            <div class="data-row"><span class="label">Network IP</span><span class="value" id="accountIp">0.0.0.0</span></div>
                            <div class="data-row"><span class="label">Access Rank</span><span class="value" style="color:var(--accent)">VERIFIED USER</span></div>
                        </div>
                    </div>

                    <div class="glass-widget" style="margin-top:30px;">
                        <div class="widget-header"><i class="fas fa-key"></i> LICENSE_CONTROL</div>
                        <div class="widget-content">
                            <input type="text" id="licenseKeyInput" class="input-glass" placeholder="XXXX-XXXX-XXXX">
                            <button id="activateKeyBtn" class="btn-fancy" style="padding:15px; font-size:0.8rem;">REDEEM ACCESS</button>
                            <button id="downloadLoaderBtnDash" class="btn-fancy" style="margin-top:15px; background:transparent; border:1px solid var(--accent); color:var(--accent);" disabled>DOWNLOAD LOADER</button>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="glass-widget">
                        <div class="widget-header"><i class="fas fa-fingerprint"></i> HARDWARE_SIGNATURE</div>
                        <div class="widget-content">
                            <div class="hwid-tag" id="hwidDisplay">SYNCING...</div>
                            <textarea id="hwidResetReason" class="input-glass" rows="3" placeholder="PROVIDE REASON FOR HWID RESET REQUEST..." style="resize:none"></textarea>
                            <button id="requestHwidResetBtn" class="btn-fancy" style="background:#000; color:var(--accent); border:1px solid var(--accent);">REQUEST RESET</button>
                        </div>
                    </div>

                    <div class="glass-widget" style="margin-top:30px;">
                        <div class="widget-header"><i class="fas fa-microchip"></i> ACTIVE_CORES</div>
                        <div id="subscriptionsList" style="text-align:center; padding:50px 0;">
                            <i class="fas fa-ghost" style="font-size:2.5rem; opacity:0.1; color:var(--accent); margin-bottom:15px;"></i>
                            <p style="color:#666; font-size:0.8rem; letter-spacing:1px;">NO EXTERNAL CORES DETECTED</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://immortal1234.pythonanywhere.com';
        // --- ADD YOUR DISCORD WEBHOOK URL HERE ---
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1497739662914093198/HH2Fg4MRqyBSHNUUPRUUiDiTMCAJruLZ0Prd76UdXDDECZLobQu4E7_q2n0XzixxM2d5'; 
        
        function getHWID() {
            let id = localStorage.getItem('immortal_hwid');
            if(!id) {
                id = 'IMM-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('immortal_hwid', id);
            }
            return id;
        }

        const currentHwid = getHWID();
        let currentUser = null;
        let activeProducts = [];
        let activationHistory = [];

        // Avatar Upload Logic
        const avatarTrigger = document.getElementById('avatarUploadTrigger');
        const avatarImg = document.getElementById('avatarImg');
        avatarTrigger.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => avatarImg.src = ev.target.result;
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };

        // Tabs
        document.querySelectorAll('.auth-tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
                t.classList.add('active');
                const isL = t.dataset.auth === 'login';
                document.getElementById('loginForm').style.display = isL ? 'block' : 'none';
                document.getElementById('signupForm').style.display = isL ? 'none' : 'block';
            }
        });

        // ----------------------------------------------------
        // --- REGISTRATION LOGIC REBUILT (NO HTML ALTERED) ---
        // ----------------------------------------------------
        document.getElementById('doSignupBtn').onclick = async () => {
            const u = document.getElementById('regUsername').value.trim();
            const e = document.getElementById('regEmail').value.trim();
            const p = document.getElementById('regPassword').value;
            const err = document.getElementById('regError');

            if (!u || !e || !p) { 
                err.style.color = "#ff3c3c";
                err.innerText = "ALL FIELDS ARE REQUIRED"; 
                return; 
            }

            const fd = new FormData();
            fd.append('username', u); 
            fd.append('password', p); 
            fd.append('email', e);
            fd.append('key', ''); // Fulfills backend requirement

            try {
                const res = await fetch(`${API_BASE}/create_account`, { method: 'POST', body: fd });
                const d = await res.json();
                
                if (res.ok) {
                    err.style.color = "var(--accent)";
                    err.innerText = "IDENTITY CREATED. PLEASE LOGIN.";
                    setTimeout(() => document.querySelector('[data-auth="login"]').click(), 1500);
                } else { 
                    err.style.color = "#ff3c3c";
                    err.innerText = d.error || "REGISTRATION FAILED"; 
                }
            } catch(error) { 
                err.style.color = "#ff3c3c";
                err.innerText = "SERVER CONNECTION TIMEOUT"; 
            }
        };

        // ----------------------------------------------------
        // --- LOGIN LOGIC ---
        // ----------------------------------------------------
        document.getElementById('doLoginBtn').onclick = async () => {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            const err = document.getElementById('loginError');
            const fd = new FormData();
            fd.append('username', u); fd.append('password', p); fd.append('hwid', currentHwid);

            try {
                const res = await fetch(`${API_BASE}/login`, { method: 'POST', body: fd });
                const d = await res.json();
                if(d.valid) {
                    currentUser = { username: u };
                    document.getElementById('authPanel').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('accountUsername').innerText = u;
                    document.getElementById('hwidDisplay').innerText = currentHwid;
                    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(j => document.getElementById('accountIp').innerText = j.ip);
                } else { err.innerText = d.error || "AUTHORIZATION_FAILED"; }
            } catch(e) { err.innerText = "SERVER_OFFLINE"; }
        };

        // ----------------------------------------------------
        // --- DASHBOARD: LICENSE, DOWNLOAD, HWID LOGIC ---
        // ----------------------------------------------------
        function refreshUI() {
            const subsContainer = document.getElementById('subscriptionsList');
            const downloadBtnDash = document.getElementById('downloadLoaderBtnDash');
            
            if (activeProducts.length > 0) {
                let html = '';
                activeProducts.forEach(prod => {
                    html += `<div style="background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--accent); padding: 1.2rem; border-radius: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-family:'JetBrains Mono'; color:#fff; font-size:0.9rem;">${prod.name}</span>
                                <span style="font-size:0.6rem; background:rgba(0, 242, 255, 0.1); color:var(--accent); padding:4px 10px; border-radius:20px;">LIFETIME</span>
                            </div>`;
                });
                subsContainer.innerHTML = html;
                downloadBtnDash.disabled = false;
                downloadBtnDash.style.opacity = "1";
            }
        }

        document.getElementById('activateKeyBtn').onclick = async () => {
            const key = document.getElementById('licenseKeyInput').value.trim();
            if (!key) { alert("ENTER LICENSE KEY FIRST"); return; }
            if (!currentUser) return;

            try {
                const url = `${API_BASE}/validate?key=${encodeURIComponent(key)}&hwid=${encodeURIComponent(currentHwid)}&username=${encodeURIComponent(currentUser.username)}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.valid === true) {
                    let productName = data.product || "Immortal Core";
                    const newSub = { name: productName, tier: "LIFETIME" };
                    if (!activeProducts.some(p => p.name === productName)) activeProducts.push(newSub);
                    if (!activationHistory.includes(key)) activationHistory.push(key);
                    refreshUI();
                    document.getElementById('licenseKeyInput').value = "";
                    alert(`ACCESS GRANTED: ${productName}`);
                } else {
                    alert(data.error || "INVALID KEY OR HWID MISMATCH");
                }
            } catch(err) { alert("CONNECTION ERROR"); }
        };

        // HWID Webhook Implementation
        document.getElementById('requestHwidResetBtn').onclick = async () => {
            const reason = document.getElementById('hwidResetReason').value;
            if (!currentUser) return;
            if (!reason.trim()) { alert("PROVIDE A REASON FOR HWID RESET"); return; }
            
            if (!DISCORD_WEBHOOK_URL.includes("discord.com")) {
                alert("Please add your Discord Webhook URL inside the code to receive this request.");
                return;
            }

            const payload = { 
                content: `**🔁 HWID RESET REQUEST**\n**User:** ${currentUser.username}\n**HWID:** \`${currentHwid}\`\n**Reason:** ${reason}\n**Time:** ${new Date().toISOString()}` 
            };

            try {
                const res = await fetch(DISCORD_WEBHOOK_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify(payload) 
                });
                if (res.ok) {
                    alert("HWID RESET REQUEST SENT TO STAFF.");
                    document.getElementById('hwidResetReason').value = "";
                } else { alert("WEBHOOK FAILED TO DELIVER"); }
            } catch(e) { alert("WEBHOOK CONNECTION ERROR"); }
        };

        document.getElementById('downloadLoaderBtnDash').onclick = () => {
            if (activationHistory.length === 0) return;
            const firstLic = activationHistory[0];
            window.open(`${API_BASE}/download?key=${encodeURIComponent(firstLic)}&hwid=${encodeURIComponent(currentHwid)}`, '_blank');
        };

        document.getElementById('dashboardLogoutBtn').onclick = () => location.reload();

        // --- THE PLEXUS ENGINE ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        let mouse = { x: null, y: null };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

        class Pt {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>canvas.width) this.vx *= -1;
                if(this.y<0 || this.y>canvas.height) this.vy *= -1;
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.2, 0, Math.PI*2); ctx.fill();
            }
        }

        function init() {
            resize();
            for(let i=0; i<95; i++) pts.push(new Pt());
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach((p, i) => {
                p.update();
                for(let j=i+1; j<pts.length; j++) {
                    const dx = p.x - pts[j].x;
                    const dy = p.y - pts[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if(d < 140) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${0.8 * (1 - d/140)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        window.onresize = resize;
        init(); animate();
    </script>
</body>
</html>
