<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal Auth | License Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0c, #030303);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main container – glass panel with red glow */
        .glass-panel {
            background: rgba(10, 10, 14, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 60, 60, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 30, 30, 0.2);
            width: 900px;
            max-width: 100%;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Header with red accent */
        .header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 60, 60, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: linear-gradient(135deg, rgba(20,0,0,0.5), rgba(0,0,0,0.3));
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ff4d4d;
            text-shadow: 0 0 8px rgba(255,0,0,0.3);
        }
        .logo i {
            font-size: 28px;
        }
        .badge {
            background: rgba(255, 60, 60, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #ff8888;
            border: 1px solid rgba(255, 80, 80, 0.3);
        }
        .badge i {
            margin-right: 6px;
            font-size: 12px;
        }

        /* Two-column layout */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding: 32px;
        }
        .log-panel {
            flex: 1.2;
            min-width: 260px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid rgba(255,80,80,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .log-header {
            padding: 16px 20px;
            background: rgba(255,60,60,0.1);
            border-bottom: 1px solid rgba(255,80,80,0.2);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            color: #ffaaaa;
        }
        .log-header i {
            margin-right: 8px;
        }
        .log-area {
            height: 320px;
            overflow-y: auto;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: #050505;
        }
        .log-line {
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px dotted rgba(255,255,255,0.05);
            color: #b0b0b0;
        }
        .log-line .time {
            color: #ff6b6b;
            margin-right: 12px;
            font-weight: 500;
        }
        .log-line.success { color: #4cff9e; }
        .log-line.error { color: #ff5555; }
        .log-line.warning { color: #ffb347; }

        /* Right side: verification form */
        .verify-panel {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            border: 1px solid rgba(255,80,80,0.2);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .title {
            font-size: 22px;
            font-weight: 800;
            color: white;
            text-align: center;
        }
        .title span {
            color: #ff4d4d;
            border-bottom: 2px solid #ff4d4d;
            padding-bottom: 4px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #ffaaaa;
        }
        .input-group input {
            background: #0e0e12;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 14px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: white;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 0 3px rgba(255,77,77,0.2);
        }
        button {
            background: linear-gradient(135deg, #ff2e2e, #b30000);
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover {
            transform: scale(1.01);
            box-shadow: 0 0 18px rgba(255,0,0,0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        .download-btn {
            background: linear-gradient(135deg, #1b8c4c, #0b5e2e);
            display: none;
            margin-top: 10px;
        }
        .download-btn i {
            font-size: 16px;
        }
        .status-badge {
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
            padding: 8px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
        }
        .status-badge i {
            margin-right: 6px;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .loading i {
            animation: pulse 0.8s infinite;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: #6a6a6a;
            border-top: 1px solid rgba(255,80,80,0.15);
        }
    </style>
</head>
<body>
<div class="glass-panel">
    <div class="header">
        <div class="logo">
            <i class="fas fa-skull"></i> IMMORTAL AUTH
        </div>
        <div class="badge">
            <i class="fas fa-shield-alt"></i> SECURE VERIFICATION
        </div>
    </div>

    <div class="dashboard">
        <!-- Terminal Logs -->
        <div class="log-panel">
            <div class="log-header">
                <i class="fas fa-terminal"></i> STATUS LOGS
            </div>
            <div class="log-area" id="logArea">
                <div class="log-line"><span class="time">[System]</span> Panel ready. Waiting for input...</div>
            </div>
        </div>

        <!-- Verification Card -->
        <div class="verify-panel">
            <div class="title"><span>✦</span> IDENTITY VERIFICATION <span>✦</span></div>
            <div class="input-group">
                <label><i class="fas fa-key"></i> LICENSE KEY</label>
                <input type="text" id="licenseKey" placeholder="IMMORTAL-XXXX-XXXX-XXXX">
            </div>
            <button id="verifyBtn"><i class="fas fa-shield-alt"></i> VERIFY LICENSE</button>
            <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> DOWNLOAD LOADER</button>
            <div class="status-badge" id="statusMsg">
                <i class="fas fa-circle-info"></i> Not verified
            </div>
        </div>
    </div>
    <footer>
        <i class="fas fa-lock"></i> HWID locked after first activation • All accesses logged
    </footer>
</div>

<script>
    // ------------------------------
    // Configuration
    // ------------------------------
    const API_URL = 'https://immortal1234.pythonanywhere.com/validate';

    // DOM elements
    const logArea = document.getElementById('logArea');
    const licenseInput = document.getElementById('licenseKey');
    const verifyBtn = document.getElementById('verifyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusDiv = document.getElementById('statusMsg');

    // Helper: Add log entry
    function addLog(message, type = 'info') {
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        const time = new Date().toLocaleTimeString();
        line.innerHTML = `<span class="time">[${time}]</span> ${message}`;
        logArea.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Generate / retrieve HWID (persistent in localStorage)
    function getHWID() {
        let hwid = localStorage.getItem('immortal_hwid');
        if (!hwid) {
            hwid = 'HWID-' + Math.random().toString(36).substr(2, 9).toUpperCase() + '-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('immortal_hwid', hwid);
        }
        return hwid;
    }

    const currentHWID = getHWID();
    addLog(`Current HWID: ${currentHWID}`, 'info');

    // License type mapping (from key prefix)
    const licenseTypes = {
        'BOOSTER':   { name: 'BOOSTER',   level: 3, msg: 'Premium access' },
        'CUSTOMER':  { name: 'CUSTOMER',  level: 2, msg: 'Standard access' },
        'ADMIN':     { name: 'ADMIN',     level: 1, msg: 'Admin privileges' },
        'PREMIUM':   { name: 'PREMIUM',   level: 4, msg: 'Elite access' },
        'IMMORTAL':  { name: 'IMMORTAL',  level: 5, msg: 'God tier access' }
    };
    const defaultType = { name: 'STANDARD', level: 2, msg: 'Standard access' };

    function getLicenseType(key) {
        const prefix = key.split('-')[0]?.toUpperCase();
        return licenseTypes[prefix] || defaultType;
    }

    // Simulate or trigger actual download of your loader
    function triggerDownload() {
        // Replace this URL with your actual loader file (exe, zip, etc.)
        const loaderUrl = 'https://raw.githubusercontent.com/BLANXOXIT/unkowscheats/refs/heads/main/Immortal%20Loader.exe';   // <-- CHANGE TO YOUR REAL DOWNLOAD LINK
        // Create a temporary link to trigger download
        const a = document.createElement('a');
        a.href = loaderUrl;
        a.download = '';  // forces download
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        addLog('Download started: Loader package', 'success');
        statusDiv.innerHTML = '<i class="fas fa-download"></i> Download started!';
    }

    // Main verification function
    async function verifyLicense() {
        const licenseKey = licenseInput.value.trim();
        if (!licenseKey) {
            addLog('Please enter a license key', 'error');
            statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Enter a key first';
            return;
        }

        // Disable button and show loading
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> VERIFYING...';
        addLog(`Contacting authentication server for key: ${licenseKey.substring(0,12)}...`, 'info');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';

        try {
            const url = `${API_URL}?key=${encodeURIComponent(licenseKey)}&hwid=${encodeURIComponent(currentHWID)}&auto_update=true`;
            const response = await fetch(url);
            const data = await response.json();
            addLog(`Server response: ${JSON.stringify(data)}`, 'info');

            if (data.valid === true) {
                const licType = getLicenseType(licenseKey);
                const activationMsg = data.first_use ? 'License activated and locked to this PC!' : 'License verified successfully!';
                addLog(activationMsg, 'success');
                addLog(`License type: ${licType.name} (Level ${licType.level})`, 'success');
                addLog(`HWID locked: ${currentHWID}`, 'success');
                statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Valid – ${licType.msg}`;
                statusDiv.style.color = '#4cff9e';
                // Show the download button!
                downloadBtn.style.display = 'flex';
                addLog('Download button unlocked', 'success');
            } else if (data.hwid_locked === true || (data.message && data.message.includes('HWID'))) {
                addLog('HWID mismatch – this license is locked to another machine', 'error');
                statusDiv.innerHTML = '<i class="fas fa-lock"></i> HWID locked to another PC';
                statusDiv.style.color = '#ff8888';
                downloadBtn.style.display = 'none';
            } else {
                const errorMsg = data.message || 'Invalid license key';
                addLog(errorMsg, 'error');
                statusDiv.innerHTML = `<i class="fas fa-ban"></i> ${errorMsg}`;
                statusDiv.style.color = '#ff5555';
                downloadBtn.style.display = 'none';
            }
        } catch (err) {
            addLog(`Network error: ${err.message}`, 'error');
            statusDiv.innerHTML = '<i class="fas fa-wifi"></i> Connection failed';
            statusDiv.style.color = '#ff8888';
            downloadBtn.style.display = 'none';
        } finally {
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-shield-alt"></i> VERIFY LICENSE';
        }
    }

    // Event listeners
    verifyBtn.addEventListener('click', verifyLicense);
    downloadBtn.addEventListener('click', triggerDownload);
    licenseInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyLicense();
    });

    // Initial logs
    addLog('Security protocols initialized', 'info');
    setTimeout(() => addLog('Network handshake complete', 'info'), 500);
    setTimeout(() => addLog('Awaiting user authentication', 'info'), 1000);
</script>
</body>
</html>
