<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal License System</title>
    <style>
        body {
            background: #0b0c0b;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e4e3e3;
        }
        .container {
            background: rgba(15, 17, 15, 0.9);
            border: 1px solid #1a1d1a;
            border-radius: 12px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 0 30px rgba(15,239,160,0.1);
        }
        h1 {
            color: #0fefa0;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #111118;
            border: 1px solid #252535;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0fefa0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .log {
            background: #000;
            border: 1px solid #1a1d1a;
            border-radius: 8px;
            padding: 12px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        .log div {
            margin-bottom: 5px;
        }
        .success { color: #0fefa0; }
        .error { color: #ef4444; }
        .info { color: #828484; }
        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 IMMORTAL AUTH</h1>
    <input type="text" id="licenseKey" placeholder="Enter your license key (e.g., IMMORTAL-XXXX-XXXX-XXXX)">
    <button id="verifyBtn">VERIFY LICENSE</button>
    <div class="log" id="logArea">
        <div>[System] Waiting for license input...</div>
    </div>
    <div class="status" id="statusMsg">Not verified</div>
</div>

<script>
    const API_URL = 'https://immortal1234.pythonanywhere.com/validate';

    // Helper to add log lines
    function addLog(message, type = 'info') {
        const logDiv = document.getElementById('logArea');
        const entry = document.createElement('div');
        entry.className = type;
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Generate or retrieve HWID
    function getHWID() {
        let hwid = localStorage.getItem('userHWID');
        if (!hwid) {
            hwid = 'HWID-' + Math.random().toString(36).substr(2,9).toUpperCase() + '-' + Math.random().toString(36).substr(2,9).toUpperCase();
            localStorage.setItem('userHWID', hwid);
        }
        return hwid;
    }

    const currentHWID = getHWID();
    addLog(`HWID: ${currentHWID}`, 'info');

    // License type mapping (based on key prefix)
    const licenseTypes = {
        'BOOSTER':   { name: 'BOOSTER',   level: 3, message: 'Premium access' },
        'CUSTOMER':  { name: 'CUSTOMER',  level: 2, message: 'Standard access' },
        'ADMIN':     { name: 'ADMIN',     level: 1, message: 'Administrator access' },
        'PREMIUM':   { name: 'PREMIUM',   level: 4, message: 'Elite access' },
        'IMMORTAL':  { name: 'IMMORTAL',  level: 5, message: 'God mode access' }
    };
    const defaultType = { name: 'STANDARD', level: 2, message: 'Standard access' };

    function getLicenseTypeFromKey(key) {
        const prefix = key.split('-')[0]?.toUpperCase();
        return licenseTypes[prefix] || defaultType;
    }

    async function verifyLicense() {
        const licenseKey = document.getElementById('licenseKey').value.trim();
        if (!licenseKey) {
            addLog('Please enter a license key.', 'error');
            return;
        }

        const verifyBtn = document.getElementById('verifyBtn');
        verifyBtn.disabled = true;
        verifyBtn.textContent = 'VERIFYING...';
        addLog(`Checking license: ${licenseKey.substring(0,12)}...`, 'info');

        try {
            const url = `${API_URL}?key=${encodeURIComponent(licenseKey)}&hwid=${encodeURIComponent(currentHWID)}&auto_update=true`;
            const response = await fetch(url);
            const data = await response.json();
            addLog(`Server response: ${JSON.stringify(data)}`, 'info');

            if (data.valid === true) {
                const licenseInfo = getLicenseTypeFromKey(licenseKey);
                const msg = data.first_use ? 'License activated and locked to this PC!' : 'License verified successfully!';
                addLog(msg, 'success');
                addLog(`License type: ${licenseInfo.name} (Level ${licenseInfo.level})`, 'success');
                addLog(`HWID locked: ${currentHWID}`, 'success');
                document.getElementById('statusMsg').innerHTML = `✅ ${msg} – ${licenseInfo.message}`;
                document.getElementById('statusMsg').style.color = '#0fefa0';
            } else if (data.hwid_locked === true || (data.message && data.message.includes('HWID'))) {
                addLog('License is HWID locked to another machine!', 'error');
                document.getElementById('statusMsg').innerHTML = '❌ HWID mismatch – request reset';
                document.getElementById('statusMsg').style.color = '#ef4444';
            } else {
                const errorMsg = data.message || 'License verification failed';
                addLog(errorMsg, 'error');
                document.getElementById('statusMsg').innerHTML = `❌ ${errorMsg}`;
                document.getElementById('statusMsg').style.color = '#ef4444';
            }
        } catch (err) {
            addLog(`Network error: ${err.message}`, 'error');
            document.getElementById('statusMsg').innerHTML = '❌ Connection error';
        } finally {
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'VERIFY LICENSE';
        }
    }

    document.getElementById('verifyBtn').addEventListener('click', verifyLicense);
    document.getElementById('licenseKey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyLicense();
    });
</script>
</body>
</html>
